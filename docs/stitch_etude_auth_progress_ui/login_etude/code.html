<style>
        body {
            background-color: #111111;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .login-card {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            box-shadow: none;
        }

        .input-field {
            background-color: #111111;
            border: 1px solid #333333;
            transition: border-color 0.15s ease-in-out;
        }

        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            ring: 0;
        }

        .btn-primary {
            background-color: #3b82f6;
            color: #f0f0f0;
            transition: all 0.15s ease-in-out;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Ambient subtle glow effect */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.03) 0%, rgba(17, 17, 17, 0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-gutter selection:bg-primary/30">
<div class="ambient-glow"></div>
<main class="relative z-10 w-full max-w-[400px]">
<!-- Header Branding -->
<header class="text-center mb-10 space-y-2">
<h2 class="font-label-caps text-label-caps uppercase tracking-[0.3em] text-on-surface-variant opacity-60">
                okestro training
            </h2>
<h1 class="font-headline-lg text-[32px] text-on-surface tracking-tighter">
                Etude
            </h1>
</header>
<!-- Login Card -->
<div class="login-card p-8 rounded-none">
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">
                        Email Address
                    </label>
<div class="relative group">
<input class="input-field w-full px-4 py-3 font-body-md text-on-surface rounded-none placeholder:text-on-surface-variant/30" id="email" placeholder="name@okestro.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">
                            Password
                        </label>
<a class="text-[10px] text-primary/60 hover:text-primary transition-colors" href="#">FORGOT_PASSWORD?</a>
</div>
<div class="relative">
<input class="input-field w-full px-4 py-3 font-body-md text-on-surface rounded-none" id="password" required="" type="password"/>
</div>
</div>
<!-- Login Action -->
<button class="btn-primary w-full py-3 font-headline-md text-body-md flex items-center justify-center gap-2 group" type="submit">
<span>LOGIN_TO_WORKSPACE</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Error Message Area -->
<div class="hidden mt-6 pt-4 border-t border-outline-variant/30" id="errorArea">
<div class="flex gap-3 items-start text-error">
<span class="material-symbols-outlined text-[18px] mt-0.5">error</span>
<p class="font-code-sm text-code-sm" id="errorMessage">
                        AUTH_FAILURE: Invalid credentials provided. Please check your system access keys and try again.
                    </p>
</div>
</div>
</div>
<!-- Footer Footer Meta -->
<footer class="mt-8 flex justify-between items-center px-2">
<div class="flex items-center gap-4">
<span class="font-code-sm text-on-surface-variant/40 text-[10px]">v1.0.4-stable</span>
<span class="w-[1px] h-3 bg-outline-variant/30"></span>
<span class="font-code-sm text-on-surface-variant/40 text-[10px]">AWS_REGION: AP-NORTHEAST-2</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant/40 text-[16px] cursor-help hover:text-on-surface transition-colors" title="System Status">terminal</span>
<span class="material-symbols-outlined text-on-surface-variant/40 text-[16px] cursor-help hover:text-on-surface transition-colors" title="Help Documentation">help_outline</span>
</div>
</footer>
</main>
<script>
        // Micro-interaction for the login form
        const loginForm = document.getElementById('loginForm');
        const errorArea = document.getElementById('errorArea');
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Simulate loading state
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>VALIDATING_CREDENTIALS...</span>`;
            
            // Mock delay to simulate network call
            setTimeout(() => {
                // Show error for demonstration purposes since it's a UI mockup
                errorArea.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                
                // Shake effect on error
                const card = document.querySelector('.login-card');
                card.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0px)' }
                ], {
                    duration: 300,
                    easing: 'ease-in-out'
                });
            }, 800);
        });

        // Clear error when user starts typing again
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                if (!errorArea.classList.contains('hidden')) {
                    errorArea.classList.add('hidden');
                }
            });
        });
    </script>
</body></html>
